name: CI

on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ docker-versioning ]
  pull_request:
    branches: [ docker-versioning ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  CDSAPI_URL: https://cds.climate.copernicus.eu/api
  CDSAPI_KEY: 1234567-ab12-34cd-9876-4o4fake90909  # A fake key for testing
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9"]
    steps:
    - name: Cancel previous
      uses: styfle/cancel-workflow-action@0.7.0
      with:
        access_token: ${{ github.token }}
      if: ${{github.ref != 'refs/head/main'}}
    - uses: actions/checkout@v2
    - name: conda cache
      uses: actions/cache@v3
      env:
        # Increase this value to reset cache if etc/example-environment.yml has not changed
        CACHE_NUMBER: 0
      with:
        path: ~/conda_pkgs_dir
        key:
          ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-${{ matrix.python-version }}-${{ hashFiles('ci3.8.yml') }}
    - name: Setup conda environment
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: ${{ matrix.python-version }}
        channels: conda-forge
        environment-file: ci${{ matrix.python-version}}.yml
        activate-environment: weather-tools
        miniforge-variant: Miniforge3
        miniforge-version: latest
        use-mamba: true
    - name: Check MetView's installation
      shell: bash -l {0}
      run: python -m metview selfcheck
    - name: Run unit tests
      shell: bash -l {0}
      run: pytest --memray --ignore=weather_dl_v2 # Ignoring dl-v2 as it only supports py3.10
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Cancel previous
        uses: styfle/cancel-workflow-action@0.7.0
        with:
          access_token: ${{ github.token }}
        if: ${{github.ref != 'refs/head/main'}}
      - uses: actions/checkout@v2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Get pip cache dir
        id: pip-cache
        run: |
          python -m pip install --upgrade pip wheel
          echo "dir=$(pip cache dir)" >> "$GITHUB_OUTPUT"
      - name: Install linter
        run: |
          pip install ruff==0.1.2
      - name: Lint project
        run: ruff check .
  type-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8"]
    steps:
      - name: Cancel previous
        uses: styfle/cancel-workflow-action@0.7.0
        with:
          access_token: ${{ github.token }}
        if: ${{github.ref != 'refs/head/main'}}
      - uses: actions/checkout@v2
      - name: conda cache
        uses: actions/cache@v3
        env:
          # Increase this value to reset cache if etc/example-environment.yml has not changed
          CACHE_NUMBER: 0
        with:
          path: ~/conda_pkgs_dir
          key:
            ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-${{ matrix.python-version }}-${{ hashFiles('ci3.8.yml') }}
      - name: Setup conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          channels: conda-forge
          environment-file: ci${{ matrix.python-version}}.yml
          activate-environment: weather-tools
          miniforge-variant: Miniforge3
          miniforge-version: latest
          use-mamba: true
      - name: Install weather-tools[test]
        run: |
          conda run -n weather-tools pip install -e .[test] --use-deprecated=legacy-resolver
      - name: Run type checker
        run: conda run -n weather-tools pytype
  check-version:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Check if VERSION.txt is updated
        run: |
          # Fetch the base branch to ensure it is available for diffing
          git fetch origin ${{ github.base_ref }}
          
          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Check if any file outside weather_dl_v2 was changed
          MODIFIED_CORE=false
          for file in $CHANGED_FILES; do
            if [[ "$file" != weather_dl_v2/* ]]; then
              MODIFIED_CORE=true
              break
            fi
          done
          
          if [ "$MODIFIED_CORE" = true ]; then
            echo "Core files modified. Checking if VERSION.txt is updated..."
            if echo "$CHANGED_FILES" | grep -q "^VERSION.txt$"; then
              echo "VERSION.txt is updated."
            else
              echo "Error: Core files modified but VERSION.txt was not updated."
              exit 1
            fi
          else
            echo "Only weather_dl_v2 files modified or no changes. Skipping VERSION.txt check."
          fi